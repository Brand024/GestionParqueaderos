spring.application.name=GestionParqueaderos

# Configuraciůn SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=gestionParqueadero;encrypt=false;trustServerCertificate=true
spring.datasource.username=tu_usuario
spring.datasource.password=tu_contraseŮa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

