spring.application.name=GestionParqueaderos

# ===============================
# CONFIGURACIÓN JDBC
# ===============================
spring.datasource.jdbc.url=jdbc:sqlserver://localhost:1433;databaseName=gestionParqueadero;encrypt=false;trustServerCertificate=true
spring.datasource.jdbc.username=sa
spring.datasource.jdbc.password=12345
spring.datasource.jdbc.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# CONFIGURACIÓN JPA
# ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=gestionParqueadero;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Properties
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect