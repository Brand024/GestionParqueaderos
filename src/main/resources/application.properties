spring.application.name=GestionParqueaderos

server.port=8081

# ===============================
# CONFIGURACI”N DE CONEXI”N
# ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=gestionParqueadero;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# CONFIGURACI”N JPA / HIBERNATE
# ===============================
# Usa 'none' si las tablas ya estŠn creadas en SQL Server
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

